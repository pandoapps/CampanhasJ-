server {
    listen 80;
    server_name _;
    charset utf-8;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # Evolution API proxy
    location /wapi/ {
        proxy_pass http://evolution-api:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
    }

    # Backend API via PHP-FPM
    location /api {
        set $phpfpm php:9000;
        fastcgi_pass $phpfpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/backend/public/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param DOCUMENT_ROOT   /var/www/html/backend/public;
        fastcgi_read_timeout 300;
        include fastcgi_params;

        add_header 'Access-Control-Allow-Origin'  '$http_origin'                                        always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS'              always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true'                                            always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  '$http_origin';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Vite dev server — inclui WebSocket do HMR
    location / {
        proxy_pass http://vite-dev:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
