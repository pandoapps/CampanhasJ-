server {
    listen 80;
    server_name _;
    charset utf-8;

    # Frontend SPA (dist)
    root /var/www/html/public_html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Static assets com cache longo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Evolution API proxy
    location /wapi/ {
        proxy_pass http://evolution-api:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
    }

    # Backend API via PHP-FPM
    location /api {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/backend/public/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param DOCUMENT_ROOT   /var/www/html/backend/public;
        fastcgi_read_timeout 300;
        include fastcgi_params;

        add_header 'Access-Control-Allow-Origin'  '$http_origin'                                        always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS'              always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true'                                            always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  '$http_origin';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
